<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Resgiter Landng Page</title>
    <link
      href="https://unpkg.com/ionicons@4.5.10-0/dist/css/ionicons.min.css"
      rel="stylesheet"
    />

    <link
      href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- <div class="container"> -->
    <header class="header">
      <nav class="navbar">
        <ul id="nav-menu">
          <li><a href="#" class="active">Home</a></li>
          <li><a href="#">About</a></li>
          <li><a href="#">Services</a></li>
          <li><a href="#">Contact</a></li>
        </ul>
      </nav>
      <form action="#" class="search-bar">
        <input type="text" placeholder="Search" />
        <button type="submit"><i class="bx bx-search"></i></button>
      </form>
      <div class="toggle-btn"><i class="bx bx-menu"></i></div>
    </header>
    <div class="background"></div>
    <!-- pop-up form -->
    <section class="first-section">
      <div class="content">
        <div class="logo">
          <img src="/Assets/logo.png" alt="chai_cup" />
          <h1>KADAK CHAI</h1>
        </div>
        <div class="text-sci">
          <h1>Welcome!</h1>
          <h3>to our KADAK CHAI website</h3>
          <p>For more intresting offers, log in to our website.</p>

          <div class="social-links">
            <a href="#"><i class="bx bxl-linkedin-square"></i></a>
            <a href="#"><i class="bx bxl-github"></i></a>
            <a href="#"><i class="bx bxl-instagram"></i></a>
          </div>
        </div>
      </div>

      <div class="login-box loreg-box">
        <div class="form-box userlogin">
          <h2>Sign In</h2>
          <form action="#">
            <div class="input-box">
              <i class="bx bxs-envelope"></i>
              <input type="email" name="e-mail" required />
              <label for="e-mail"> Email </label>
            </div>
            <div class="input-box">
              <i class="bx bxs-lock-alt"></i>
              <input type="password" name="password" required />
              <label for="password"> Password </label>
            </div>

            <div class="remember-forgot">
              <label> <input type="checkbox" required />Remember Me</label>

              <a href="#">Forgot Password</a>
            </div>

            <button type="submit">Sign In</button>

            <div class="login-register">
              <p>
                Don't have an account?
                <a href="#" class="register-link">Sign Up</a>
              </p>
            </div>
          </form>
        </div>
        <div class="form-box register">
          <h2>Sign Up</h2>
          <form action="#">
            <div class="input-box">
              <i class="bx bxs-envelope"></i>
              <input type="text" name="y.name" required />
              <label for="y.name"> Name </label>
            </div>
            <div class="input-box">
              <i class="bx bxs-envelope"></i>
              <input type="email" name="e-mail" required />
              <label for="e-mail"> Email </label>
            </div>
            <div class="input-box">
              <i class="bx bxs-lock-alt"></i>
              <input type="password" name="password" required />
              <label for="password"> Password </label>
            </div>

            <div class="remember-forgot">
              <label>
                <input type="checkbox" required />I agreed the
                <a href="#">Term & Conditions</a></label
              >
            </div>

            <button type="submit">Sign In</button>

            <div class="login-register">
              <p>
                Don't have an account?
                <a href="#" class="login-link">Sign Up</a>
              </p>
            </div>
          </form>
        </div>
      </div>
    </section>
    <!-- </div> -->
    <script src="script.js"></script>
  </body>
</html>
